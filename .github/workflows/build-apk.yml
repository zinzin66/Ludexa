name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
      
      - name: Install Cordova
        run: npm install -g cordova
      
      - name: Create app
        run: |
          cordova create myapp com.ludexa.ludexa Ludexa
          cd myapp
          cp ../config.xml .
          rm -rf www/*
          cp ../index.html www/
          cp ../*.js www/ 2>/dev/null || true
          cp ../*.css www/ 2>/dev/null || true
      
      - name: Update config for Android 16
        run: |
          cd myapp
          sed -i '/<platform name="android">/a\        <preference name="android:targetSdkVersion" value="35" />\n        <preference name="android:minSdkVersion" value="24" />' config.xml
      
      - name: Add Android platform
        run: |
          cd myapp
          cordova platform add android@latest
      
      - name: Build APK
        run: |
          cd myapp
          cordova build android --release -- --packageType=apk
      
      - name: Find APK
        run: find myapp -name "app-release*.apk" -type f
      
      - name: Sign APK
        run: |
          cd myapp/platforms/android/app/build/outputs/apk/release/
          keytool -genkey -v -keystore my.keystore -keyalg RSA -keysize 2048 -validity 10000 -alias mykey -storepass "password123" -keypass "password123" -dname "CN=Ludexa" 2>/dev/null || true
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore my.keystore -storepass "password123" -keypass "password123" app-release-unsigned.apk mykey
          mv app-release-unsigned.apk app-release-signed.apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ludexa-APK
          path: myapp/platforms/android/app/build/outputs/apk/release/app-release-signed.apk

name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
      
      - name: Install Cordova CLI
        run: npm install -g cordova@latest
      
      - name: Create Cordova App
        run: cordova create app com.ludexa.ludexa Ludexa
      
      - name: Copy config.xml
        run: cp config.xml app/config.xml
      
      - name: Copy Web Files
        run: |
          rm -rf app/www/*
          cp index.html app/www/
          cp *.js app/www/ 2>/dev/null || true
          cp *.css app/www/ 2>/dev/null || true
      
      - name: Add Android Platform
        run: |
          cd app
          cordova platform add android --save
      
      - name: Build Release APK
        run: |
          cd app
          cordova build android --release
      
      - name: Find APK
        run: find app/platforms/android -name "*.apk" -type f
      
      - name: Sign APK with jarsigner
        run: |
          cd app/platforms/android/app/build/outputs/apk/release/
          keytool -genkey -v -keystore ludexa.keystore -keyalg RSA -keysize 2048 -validity 365 -alias ludexa -storepass "ludexa123" -keypass "ludexa123" -dname "CN=Ludexa,OU=Dev,O=Ludexa,L=Spain,ST=Spain,C=ES"
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 -keystore ludexa.keystore -storepass "ludexa123" -keypass "ludexa123" app-release-unsigned.apk ludexa
          mv app-release-unsigned.apk app-release.apk
          cd /home/runner/work/Ludexa/Ludexa
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ludexa-apk
          path: app/platforms/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: app/platforms/android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

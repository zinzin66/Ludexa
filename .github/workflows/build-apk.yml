name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
      
      - name: Install dependencies
        run: npm install -g cordova
      
      - name: Create and build app
        run: |
          cordova create myapp com.ludexa.ludexa Ludexa
          cd myapp
          cp ../config.xml .
          rm -rf www/*
          cp ../index.html www/
          cp ../*.js www/ 2>/dev/null || true
          cp ../*.css www/ 2>/dev/null || true
          cordova platform add android
          cordova build android --release -- --packageType=apk
      
      - name: Sign APK
        run: |
          cd myapp/platforms/android/app/build/outputs/apk/release/
          keytool -genkey -v -keystore ludexa.keystore -keyalg RSA -keysize 2048 -validity 10000 -alias ludexa -storepass "ludexa12345" -keypass "ludexa12345" -dname "CN=Ludexa,OU=Dev,O=Ludexa,L=Spain,ST=Spain,C=ES" 2>/dev/null || true
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore ludexa.keystore -storepass "ludexa12345" -keypass "ludexa12345" app-release-unsigned.apk ludexa
          mv app-release-unsigned.apk app-release-signed.apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ludexa
          path: myapp/platforms/android/app/build/outputs/apk/release/app-release-signed.apk

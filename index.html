<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ludexa 2D Éditeur</title>
<link rel="stylesheet" href="style.css">
<!-- Librairie JSZip chargée en local pour éviter les blocages du serveur -->
<script src="jszip.min.js"></script>
</head>
<body>
<!-- ÉCRAN DE DÉMARRAGE -->
<div id="start-screen">
<div class="start-card" style="position: relative;">

<!-- SÉLECTEUR DE LANGUE -->
<select id="lang-selector" style="position: absolute; top: 16px; right: 16px; background: var(--bg-panel); color: var(--text-color); border: 1px solid var(--border-color); padding: 6px; border-radius: 4px; font-size: 14px; cursor: pointer;">
<option value="fr">🇫🇷 Français</option>
<option value="en">🇬🇧 English</option>
<option value="es">🇪🇸 Español</option>
<option value="pt">🇵🇹 Português</option>
<option value="ru">🇷🇺 Русский</option>
</select>

<div class="start-logo">🕹️</div>
<h1>Ludexa 2D Engine</h1>
<p data-i18n="start_subtitle" style="color: var(--text-muted); margin-bottom: 24px; font-size: 14px;">Éditeur de jeux et prototypes 2D</p>
<div class="start-sections">
<div class="start-section-box">
<h3 data-i18n="start_new_project">Nouveau Projet</h3>
<button id="btn-new-project" class="btn-primary" data-i18n="start_btn_create">Créer un Projet</button>
</div>
<div class="start-section-box">
<h3 data-i18n="start_existing_project">Projet Existant</h3>
<label for="input-import-project" class="btn-secondary-file" data-i18n="start_btn_import">Ouvrir / Importer (.json)</label>
<input type="file" id="input-import-project" accept=".json" style="display: none;">
</div>
<!-- NOUVEAU BOUTON : REPRENDRE PROJET LOCAL -->
<div class="start-section-box">
<h3>Reprendre</h3>
<button id="btn-load-local" class="btn-primary" style="background:#8b5cf6;">Continuer le projet local</button>
</div>
</div>
</div>
</div>
<!-- BARRE DE NAVIGATION -->
<header id="top-navbar">
<button id="btn-toggle-sidebar">☰</button>
<div class="nav-group">
<select id="select-scene"><option value="scene1">Scène 1</option></select>
<button id="btn-add-scene">+</button>
<button id="btn-remove-scene">-</button>
<button id="btn-rename-scene">✏️</button>
<span style="color: #555; margin: 0 8px;">|</span>
<button id="btn-play-game" style="background: #10b981; color: white; border: none; font-weight: bold;">▶️ Jouer</button>
<button id="btn-stop-game" style="background: #ef4444; color: white; border: none; font-weight: bold;">⏹️ Stop</button>
<button id="btn-build-game" style="background: #8b5cf6; color: white; border: none; font-weight: bold; margin-left: 8px;">🚀 Build HTML</button>
<!-- NOUVEAU BOUTON TEST APK -->
<button id="btn-test-jszip" style="background: #eab308; color: white; border: none; font-weight: bold; margin-left: 8px;">📦 Test APK</button>
</div>
<div class="nav-group" style="margin-left: auto;">
<button id="btn-project-settings">⚙️ Projet</button>
<button id="btn-export-project" style="background: #2ed573; color: #fff; border: none;">💾 Sauver Projet</button>
<button id="btn-close-project">❌ Quitter</button>
<span style="color: #555; margin: 0 4px;">|</span>
<button id="btn-open-blueprint" style="background: #3b82f6; color: #fff; border: none;">🧩 Scripts</button>
<button id="btn-tool-hand">🖐️</button>
<button id="btn-toggle-grid" class="active">🌐</button>
<button id="btn-zoom-out">-</button>
<button id="btn-zoom-reset">1:1</button>
<button id="btn-zoom-in">+</button>
</div>
</header>
<!-- fin 1 -->


<!-- debut 2 -->
<!-- ZONE DE TRAVAIL -->
<main id="workspace">
<aside id="sidebar">
<section class="panel">
<div class="panel-header">Arborescence <span>▼</span></div>
<div class="panel-content"><ul id="treeview"></ul></div>
</section>
<section class="panel">
<div class="panel-header">Ressources <span>▼</span></div>
<div class="panel-content" style="display: flex; flex-direction: column; gap: 6px;">
<button id="btn-add-rect">+ Rectangle</button>
<button id="btn-add-circle">+ Rond</button>
<button id="btn-add-button">+ Bouton</button>
<button id="btn-add-text">+ Texte</button>
</div>
</section>
<section class="panel">
<div class="panel-header">Assets (Fichiers) <span>▼</span></div>
<div class="panel-content">
<div id="assets-list-container"></div>
<button id="btn-import-asset" style="width: 100%;">+ Importer Asset</button>
</div>
</section>
<!-- PANNEAU VARIABLES -->
<section class="panel">
<div class="panel-header">Variables <span>▼</span></div>
<div class="panel-content">
<div id="variables-list-container" style="margin-bottom: 8px;"></div>
<button id="btn-add-variable" style="width: 100%; background: #3b82f6; color: white; border: none;">+ Nouvelle Variable</button>
</div>
</section>
</aside>
<div id="canvas-container"><canvas id="editor-canvas"></canvas></div>
<aside id="sidebar-right">
<section class="panel" style="height: 100%;">
<div class="panel-header">Inspecteur <span>▼</span></div>
<div class="panel-content" id="inspector"><p>Sélect. un objet</p></div>
</section>
</aside>
</main>
<!-- MODAL VARIABLE -->
<div id="variable-settings-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 15000; align-items: center; justify-content: center;">
<div style="background: #2a2a38; padding: 24px; border-radius: 8px; width: 90%; max-width: 400px;">
<h3>Créer une Variable</h3>
<input type="text" id="input-var-name" placeholder="Nom (ex: score)" style="width: 100%; padding: 8px; margin-bottom: 10px;">
<input type="text" id="input-var-value" value="0" style="width: 100%; padding: 8px; margin-bottom: 10px;">
<select id="select-var-scope" style="width: 100%; padding: 8px; margin-bottom: 20px;">
<option value="global">🌍 Globale</option>
<option value="scene">📍 Locale</option>
</select>
<div style="display: flex; justify-content: flex-end; gap: 10px;">
<button id="btn-cancel-variable">Annuler</button>
<button id="btn-save-variable" style="background: #2ed573; color: white;">Enregistrer</button>
</div>
</div>
</div>
<!-- fin 2 -->
<!-- debut 3 -->
<!-- MODAL SCRIPT -->
<div id="blueprint-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e1e24; z-index: 20000; flex-direction: column;">
<header style="height: 48px; background: #141419; display: flex; align-items: center; padding: 0 16px; justify-content: space-between;">
<span>🧩 Éditeur de Scripts</span>
<button id="btn-close-blueprint" style="background: #ef4444; color: white;">Fermer</button>
</header>
<div id="blueprint-canvas-container" style="flex: 1; position: relative;">
<canvas id="blueprint-canvas"></canvas>
</div>
<!-- MODAL ÉDITEUR D'EXPRESSION (Intégré dans le Blueprint) -->
<div id="bp-expr-modal" style="display: none; position: absolute; top: 20%; left: 30%; background: #333; padding: 20px; z-index: 20001;">
<textarea id="bp-expr-textarea" style="width: 100%; height: 100px;"></textarea>
<div id="bp-var-list-modal" style="display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px;"></div>
<button onclick="document.getElementById('bp-expr-modal').style.display='none'">Valider</button>
</div>
</div>
<!-- SCRIPT DE CRÉATION APK (SÉCURISÉ) -->
<script>
// On sécurise le chargement : on attend que l'interface soit 100% prête
document.addEventListener('DOMContentLoaded', function() {
let btnTest = document.getElementById('btn-test-jszip');
if (!btnTest) return; // Si le bouton n'est pas là, on s'arrête proprement
btnTest.onclick = function() {
try {
if (typeof JSZip === 'undefined') {
alert("Erreur : La librairie JSZip n'est pas chargée.");
return;
}
let e = window.engine;
if (!e || !e.sm) {
alert("Erreur : Le moteur de jeu n'est pas encore prêt.");
return;
}
alert("1/3 : Assemblage des données...");
let apk = new JSZip();
// Nettoyage de la coquille
apk.folder("META-INF").file("certificat.rsa", "fausse signature de base");
apk.folder("assets/public").file("vieux_fichier.html", "vieux contenu");
apk.remove("META-INF");
apk.remove("assets/public");
let dossierPublic = apk.folder("assets/public");
let dossierMedia = dossierPublic.folder("media");
// Copie sécurisée des données du projet
let projectData = {
version: "1.2",
timestamp: Date.now(),
projectName: e.projectName,
scenes: JSON.parse(JSON.stringify(e.sm.scenes)),
currentSceneId: e.sm.currentSceneId,
variables: JSON.parse(JSON.stringify(e.variables || [])),
scripts: JSON.parse(JSON.stringify(e.scripts || {})),
assets: []
};
alert("2/3 : Conversion des assets en fichiers...");
if (e.am && typeof e.am.getAllAssets === 'function') {
let rawAssets = e.am.getAllAssets();
rawAssets.forEach(function(asset) {
let cleanAsset = { id: asset.id, name: asset.name, type: asset.type };
// Découpage et extraction du Base64
if (asset.src && asset.src.indexOf('base64,') !== -1) {
let base64Data = asset.src.split('base64,')[1];
dossierMedia.file(asset.name, base64Data, {base64: true});
cleanAsset.src = "media/" + asset.name;
} else {
cleanAsset.src = asset.src;
}
projectData.assets.push(cleanAsset);
});
}
dossierPublic.file("game_data.json", JSON.stringify(projectData, null, 2));
// Création du fichier HTML avec une syntaxe universelle
let html1 = "<!DOCTYPE html>\n<html lang='fr'>\n<head><meta charset='UTF-8'><title>";
let html2 = "</title></head>\n<body style='background:#14141c; color:white; text-align:center; padding-top:50px;'>\n<h1>Jeu Autonome</h1>\n<p>Données lues depuis <b>game_data.json</b>.</p>\n</body>\n</html>";
dossierPublic.file("index.html", html1 + (e.projectName || "Ludexa Game") + html2);
apk.generateAsync({type:"blob"}).then(function(contenuZip) {
alert("3/3 : Archive prête ! Téléchargement...");
let url = URL.createObjectURL(contenuZip);
let lien = document.createElement("a");
lien.href = url;
lien.download = (e.projectName || "ludexa_export") + "_apk.zip";
document.body.appendChild(lien);
lien.click();
document.body.removeChild(lien);
}).catch(function(erreurAsync) {
alert("Erreur de génération : " + erreurAsync);
if (console.error) console.error("Erreur ZIP :", erreurAsync);
});
} catch (erreurGenerale) {
alert("Erreur générale : " + erreurGenerale.message);
if (console.error) console.error("Erreur Globale :", erreurGenerale);
}
};
});
</script>
<!-- INJECTION DES SCRIPTS (Ordre strict) -->
<script src="nodes-config.js"></script>
<script src="nodes-interpreter.js"></script>
<script src="blueprint.js"></script>
<script type="module" src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ludexa IDE - Engine 2D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <header id="top-bar">
            <div class="brand">
                <h1>Ludexa</h1>
            </div>
            
            <div class="controls-center">
                <button id="btn-play" class="btn btn-success">▶ Play</button>
                <button id="btn-pause" class="btn btn-warning">⏸ Pause</button>
            </div>

            <div class="right-actions">
                <div class="mode-switch">
                    <button id="btn-mode-scene" class="btn btn-mode active">🎨 Scène</button>
                    <button id="btn-mode-logic" class="btn btn-mode">🧩 Logique</button>
                </div>
                <button id="toggle-sidebar" class="btn-toggle">☰</button>
            </div>
        </header>

        <div id="workspace">
            <main id="viewport">
                <div id="canvas-placeholder">
                    <span>Zone de Rendu 2D</span>
                </div>
            </main>

            <aside id="sidebar">
                
                <section class="sidebar-section" id="scene-tree-section">
                    <div class="section-header">
                        <h2>Objets de la scène</h2>
                        <button id="btn-add-object" class="btn-icon">+</button>
                    </div>
                    <ul id="object-list" class="scrollable-list">
                        <li class="object-item active">
                            <span class="obj-icon">🔲</span>
                            <span class="obj-name">Joueur</span>
                            <span class="obj-zindex">Z: 2</span>
                        </li>
                        <li class="object-item">
                            <span class="obj-icon">🔤</span>
                            <span class="obj-name">textVar</span>
                            <span class="obj-zindex">Z: 1</span>
                        </li>
                        <li class="object-item">
                            <span class="obj-icon">🖼️</span>
                            <span class="obj-name">Fond</span>
                            <span class="obj-zindex">Z: 0</span>
                        </li>
                    </ul>
                </section>

                <section class="sidebar-section" id="inspector-section">
                    <div class="section-header">
                        <h2>Inspecteur</h2>
                    </div>
                    <div id="inspector-content" class="scrollable-content">
                        <div class="prop-group">
                            <label>Nom de l'instance</label>
                            <input type="text" id="prop-name" value="Joueur" class="touch-input">
                        </div>
                        <div class="prop-row">
                            <div class="prop-group">
                                <label>Pos X</label>
                                <input type="number" id="prop-x" value="100" class="touch-input">
                            </div>
                            <div class="prop-group">
                                <label>Pos Y</label>
                                <input type="number" id="prop-y" value="150" class="touch-input">
                            </div>
                        </div>
                        <div class="prop-row">
                            <div class="prop-group">
                                <label>Largeur (W)</label>
                                <input type="number" id="prop-w" value="50" class="touch-input">
                            </div>
                            <div class="prop-group">
                                <label>Hauteur (H)</label>
                                <input type="number" id="prop-h" value="50" class="touch-input">
                            </div>
                        </div>
                        <div class="prop-group">
                            <label>Couleur / Filtre</label>
                            <input type="color" id="prop-color" value="#6dbf4b" class="touch-color-input">
                        </div>
                        <div class="prop-group">
                            <label>Texte</label>
                            <input type="text" id="prop-text" placeholder="Affiche une valeur..." class="touch-input">
                        </div>
                    </div>
                </section>

                <section class="sidebar-section" id="assets-section">
                    <div class="section-header">
                        <h2>Assets / Ressources</h2>
                        <button id="btn-import-asset" class="btn-icon">+</button>
                    </div>
                    <div id="assets-grid" class="scrollable-grid">
                        <div class="asset-card">
                            <span class="asset-icon">🖼️</span>
                            <span class="asset-name">hero.png</span>
                        </div>
                        <div class="asset-card">
                            <span class="asset-icon">🖼️</span>
                            <span class="asset-name">door.png</span>
                        </div>
                        <div class="asset-card">
                            <span class="asset-icon">🎵</span>
                            <span class="asset-name">click.mp3</span>
                        </div>
                    </div>
                </section>

            </aside>
        </div>
    </div>

    <script src="ludexa.js"></script>
</body>
</html>

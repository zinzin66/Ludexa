<!-- debut 1 -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludexa 2D Éditeur</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ÉCRAN DE DÉMARRAGE -->
    <div id="start-screen">
        <div class="start-card">
            <div class="start-logo">🕹️</div>
            <h1>Ludexa 2D Engine</h1>
            <p style="color: var(--text-muted); margin-bottom: 24px; font-size: 14px;">Éditeur de jeux et prototypes 2D</p>
            
            <div class="start-sections">
                <div class="start-section-box">
                    <h3>Nouveau Projet</h3>
                    <button id="btn-new-project" class="btn-primary">Créer un Projet</button>
                </div>
                
                <div class="start-section-box">
                    <h3>Projet Existant</h3>
                    <label for="input-import-project" class="btn-secondary-file">Ouvrir / Importer (.json)</label>
                    <input type="file" id="input-import-project" accept=".json" style="display: none;">
                </div>
            </div>
        </div>
    </div>

    <!-- BARRE DE NAVIGATION -->
    <header id="top-navbar">
        <button id="btn-toggle-sidebar">☰</button>
        <div class="nav-group">
            <select id="select-scene"><option value="scene1">Scène 1</option></select>
            <button id="btn-add-scene">+</button>
            <button id="btn-remove-scene">-</button>
            <button id="btn-rename-scene">✏️</button>
            <span style="color: #555; margin: 0 8px;">|</span>
            <button id="btn-play-game" style="background: #10b981; color: white; border: none; font-weight: bold;">▶️ Jouer</button>
            <button id="btn-stop-game" style="background: #ef4444; color: white; border: none; font-weight: bold;">⏹️ Stop</button>
            <button id="btn-build-game" style="background: #8b5cf6; color: white; border: none; font-weight: bold; margin-left: 8px;">🚀 Build HTML</button>
        </div>
        <div class="nav-group" style="margin-left: auto;">
            <button id="btn-project-settings">⚙️ Projet</button>
            <button id="btn-export-project" style="background: #2ed573; color: #fff; border: none;">💾 Sauver Projet</button>
            <button id="btn-close-project">❌ Quitter</button>
            <span style="color: #555; margin: 0 4px;">|</span>
            <button id="btn-open-blueprint" style="background: #3b82f6; color: #fff; border: none;">🧩 Scripts</button>
            <button id="btn-tool-hand">🖐️</button>
            <button id="btn-toggle-grid" class="active">🌐</button>
            <button id="btn-zoom-out">-</button>
            <button id="btn-zoom-reset">1:1</button>
            <button id="btn-zoom-in">+</button>
        </div>
    </header>

    <!-- ZONE DE TRAVAIL -->
    <main id="workspace">
        <aside id="sidebar">
            <section class="panel">
                <div class="panel-header">Arborescence <span>▼</span></div>
                <div class="panel-content"><ul id="treeview"></ul></div>
            </section>
            <section class="panel">
                <div class="panel-header">Ressources <span>▼</span></div>
                <div class="panel-content" style="display: flex; flex-direction: column; gap: 6px;">
                    <button id="btn-add-rect">+ Rectangle</button>
                    <button id="btn-add-circle">+ Rond</button>
                    <button id="btn-add-button">+ Bouton</button>
                    <button id="btn-add-text">+ Texte</button>
                </div>
            </section>
            <section class="panel">
                <div class="panel-header">Assets (Fichiers) <span>▼</span></div>
                <div class="panel-content">
                    <div id="assets-list-container"></div>
                    <button id="btn-import-asset" style="width: 100%;">+ Importer Asset</button>
                </div>
            </section>
            <!-- PANNEAU VARIABLES -->
            <section class="panel">
                <div class="panel-header">Variables <span>▼</span></div>
                <div class="panel-content">
                    <div id="variables-list-container" style="margin-bottom: 8px;"></div>
                    <button id="btn-add-variable" style="width: 100%; background: #3b82f6; color: white; border: none;">+ Nouvelle Variable</button>
                </div>
            </section>
        </aside>

        <div id="canvas-container"><canvas id="editor-canvas"></canvas></div>

        <aside id="sidebar-right">
            <section class="panel" style="height: 100%;">
                <div class="panel-header">Inspecteur <span>▼</span></div>
                <div class="panel-content" id="inspector"><p>Sélect. un objet</p></div>
            </section>
        </aside>
    </main>

    <!-- MODAL VARIABLE -->
    <div id="variable-settings-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 15000; align-items: center; justify-content: center;">
        <div style="background: #2a2a38; padding: 24px; border-radius: 8px; width: 90%; max-width: 400px;">
            <h3>Créer une Variable</h3>
            <input type="text" id="input-var-name" placeholder="Nom (ex: score)" style="width: 100%; padding: 8px; margin-bottom: 10px;">
            <input type="text" id="input-var-value" value="0" style="width: 100%; padding: 8px; margin-bottom: 10px;">
            <select id="select-var-scope" style="width: 100%; padding: 8px; margin-bottom: 20px;">
                <option value="global">🌍 Globale</option>
                <option value="scene">📍 Locale</option>
            </select>
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button id="btn-cancel-variable">Annuler</button>
                <button id="btn-save-variable" style="background: #2ed573; color: white;">Enregistrer</button>
            </div>
        </div>
    </div>
<!-- fin 1 -->

<!-- debut 2 -->
    <!-- MODAL SCRIPT -->
    <div id="blueprint-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e1e24; z-index: 20000; flex-direction: column;">
        <header style="height: 48px; background: #141419; display: flex; align-items: center; padding: 0 16px; justify-content: space-between;">
            <span>🧩 Éditeur de Scripts</span>
            <button id="btn-close-blueprint" style="background: #ef4444; color: white;">Fermer</button>
        </header>
        <div id="blueprint-canvas-container" style="flex: 1; position: relative;">
            <canvas id="blueprint-canvas"></canvas>
        </div>
        <!-- MODAL ÉDITEUR D'EXPRESSION (Intégré dans le Blueprint) -->
        <div id="bp-expr-modal" style="display: none; position: absolute; top: 20%; left: 30%; background: #333; padding: 20px; z-index: 20001;">
            <textarea id="bp-expr-textarea" style="width: 100%; height: 100px;"></textarea>
            <div id="bp-var-list-modal" style="display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px;"></div>
            <button onclick="document.getElementById('bp-expr-modal').style.display='none'">Valider</button>
        </div>
    </div>

    <!-- INJECTION DES SCRIPTS (Ordre strict) -->
    <script src="nodes-config.js"></script>
    <script src="nodes-interpreter.js"></script>
    <script src="blueprint.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
<!-- fin 2 -->

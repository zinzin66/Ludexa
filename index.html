<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ludexa IDE - Moteur 2D Tablette</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="topbar">
            <button id="btn-toggle-sidebar" class="btn" title="Menu Panneau">☰</button>
            <div class="divider"></div>
            
            <div class="scene-selector">
                <select id="select-scene">
                    <option value="scene1">Scène 1</option>
                </select>
                <button id="btn-add-scene" class="btn">+</button>
                <button id="btn-remove-scene" class="btn">-</button>
            </div>
            
            <div class="divider"></div>
            
            <div class="tools">
                <button id="btn-tool-hand" class="btn tool-btn" title="Glisser la vue">✋</button>
                <button id="btn-toggle-grid" class="btn tool-btn active" title="Afficher la grille">🏁</button>
                <div class="zoom-controls">
                    <button id="btn-zoom-in" class="btn">🔍+</button>
                    <button id="btn-zoom-reset" class="btn">1:1</button>
                    <button id="btn-zoom-out" class="btn">🔍-</button>
                </div>
            </div>
        </header>

        <div class="main-container">
            <aside id="sidebar" class="sidebar">
                <section class="panel">
                    <h3>Arborescence</h3>
                    <ul id="treeview" class="treeview-list"></ul>
                </section>

                <section class="panel">
                    <h3>Inspecteur</h3>
                    <div id="inspector" class="inspector-fields">
                        <p class="placeholder-text">Sélect. un objet</p>
                    </div>
                </section>

                <section class="panel">
                    <h3>Ressources</h3>
                    <div class="resources-list">
                        <button id="btn-add-rect" class="btn btn-block">+ Rectangle</button>
                        <button id="btn-add-text" class="btn btn-block">+ Texte</button>
                    </div>
                </section>
            </aside>

            <main class="canvas-container">
                <canvas id="editor-canvas" width="800" height="450"></canvas>
            </main>
        </div>
    </div>

    <script src="ludexa.js"></script>
</body>
</html>
